{% extends 'base.html' %}

{% block content %}

<h2>Categorias</h2>

<a href="{% url 'adicionar_categoria' %}" class="btn btn-primary">
    Adicionar Categoria
</a>

<br><br>

<table style="width:100%; border-collapse: collapse; background:white;">
    <thead style="background:#eee;">
        <tr>
            <th style="padding:10px;">Nome</th>
            <th style="padding:10px;">Ações</th>
        </tr>
    </thead>

    <tbody>
        {% for categoria in categorias %}
        <tr style="border-bottom:1px solid #ddd;">
            <td style="padding:10px;">{{ categoria.nome }}</td>

            <td style="padding:10px;">
                <a href="{% url 'editar_categoria' categoria.id %}" class="btn btn-primary">
                    Editar
                </a>

                <a href="{% url 'excluir_categoria' categoria.id %}" class="btn btn-danger">
                    Excluir
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
