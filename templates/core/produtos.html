{% extends 'base.html' %}

{% block content %}

<h2>Produtos</h2>

<a href="{% url 'adicionar_produto' %}" class="btn btn-primary">
    Adicionar Produto
</a>

<br><br>

<table style="width:100%; border-collapse: collapse; background:white;">
    <thead style="background:#eee;">
        <tr>
            <th style="padding:10px;">Nome</th>
            <th style="padding:10px;">Preço</th>
            <th style="padding:10px;">Categoria</th>
            <th style="padding:10px;">Ações</th>
        </tr>
    </thead>

    <tbody>
        {% for produto in produtos %}
        <tr style="border-bottom:1px solid #ddd;">
            <td style="padding:10px;">{{ produto.nome }}</td>
            <td style="padding:10px;">R$ {{ produto.preco }}</td>
            <td style="padding:10px;">{{ produto.categoria }}</td>

            <td style="padding:10px;">
                <a href="{% url 'editar_produto' produto.id %}" class="btn btn-primary">
                    Editar
                </a>

                <a href="{% url 'excluir_produto' produto.id %}" class="btn btn-danger">
                    Excluir
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
