{% extends 'base.html' %}

{% block content %}

<h2>Contatos</h2>

<table style="width:100%; border-collapse: collapse; background:white;">
    <thead style="background:#eee;">
        <tr>
            <th style="padding:10px;">Nome</th>
            <th style="padding:10px;">Email</th>
            <th style="padding:10px;">Assunto</th>
            <th style="padding:10px;">Mensagem</th>
            <th style="padding:10px;">Ações</th>
        </tr>
    </thead>

    <tbody>
        {% for contato in contatos %}
        <tr style="border-bottom:1px solid #ddd;">
            <td style="padding:10px;">{{ contato.nome }}</td>
            <td style="padding:10px;">{{ contato.email }}</td>
            <td style="padding:10px;">{{ contato.assunto }}</td>
            <td style="padding:10px;">{{ contato.mensagem }}</td>

            <td style="padding:10px;">
                <a href="{% url 'excluir_contato' contato.id %}" class="btn btn-danger">
                    Excluir
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
